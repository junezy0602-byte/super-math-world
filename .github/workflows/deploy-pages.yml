name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fill Firebase config
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          test -n "$FIREBASE_API_KEY"
          test -n "$FIREBASE_AUTH_DOMAIN"
          test -n "$FIREBASE_PROJECT_ID"
          test -n "$FIREBASE_STORAGE_BUCKET"
          test -n "$FIREBASE_MESSAGING_SENDER_ID"
          test -n "$FIREBASE_APP_ID"

          perl -0pi -e 's/YOUR_API_KEY/$ENV{FIREBASE_API_KEY}/g' index.html teacher.html
          perl -0pi -e 's/YOUR_PROJECT\.firebaseapp\.com/$ENV{FIREBASE_AUTH_DOMAIN}/g' index.html teacher.html
          perl -0pi -e 's/YOUR_PROJECT_ID/$ENV{FIREBASE_PROJECT_ID}/g' index.html teacher.html
          perl -0pi -e 's/YOUR_PROJECT\.appspot\.com/$ENV{FIREBASE_STORAGE_BUCKET}/g' index.html teacher.html
          perl -0pi -e 's/YOUR_SENDER_ID/$ENV{FIREBASE_MESSAGING_SENDER_ID}/g' index.html teacher.html
          perl -0pi -e 's/YOUR_APP_ID/$ENV{FIREBASE_APP_ID}/g' index.html teacher.html
          perl -0pi -e 's/YOUR_MEASUREMENT_ID/$ENV{FIREBASE_MEASUREMENT_ID}/g' index.html teacher.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
