<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Super Math World: Number Kingdom</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background: #6ed0ff;
      color: #16314f;
      overscroll-behavior: none;
      touch-action: none;
    }

    body {
      display: grid;
      place-items: center;
    }

    #gameShell {
      position: relative;
      width: min(100vw, 1180px);
      aspect-ratio: 16 / 9;
      max-height: 100vh;
      overflow: hidden;
      border: 5px solid #1b3552;
      background: #76d8ff;
      box-shadow: 0 18px 0 #13283f;
      image-rendering: pixelated;
      touch-action: none;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
    }

    .screen,
    .modalShade {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vw, 44px);
      background:
        linear-gradient(rgba(118, 216, 255, 0.5), rgba(118, 216, 255, 0.08)),
        radial-gradient(circle at 25% 18%, rgba(255, 255, 255, 0.78) 0 48px, transparent 49px),
        radial-gradient(circle at 70% 28%, rgba(255, 255, 255, 0.68) 0 62px, transparent 63px);
      z-index: 5;
    }

    .screen.active,
    .modalShade.active {
      display: flex;
    }

    .panel {
      width: min(720px, 92vw);
      padding: clamp(18px, 4vw, 34px);
      border: 5px solid #172c42;
      border-radius: 8px;
      background: #fff7d1;
      box-shadow: 0 10px 0 #b6782e;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 6vw, 58px);
      line-height: 0.95;
      color: #d93824;
      text-shadow: 3px 3px 0 #ffd24a, 5px 5px 0 #14324f;
    }

    h2 {
      margin: 0 0 18px;
      font-size: clamp(22px, 4vw, 36px);
      color: #173957;
    }

    .subtitle {
      margin: 0 0 24px;
      font-size: clamp(15px, 2.4vw, 22px);
      font-weight: 800;
      color: #225b73;
    }

    button {
      border: 4px solid #172c42;
      border-radius: 8px;
      background: #ffcf3d;
      color: #172c42;
      font: 900 clamp(16px, 2.5vw, 22px) "Trebuchet MS", Arial, sans-serif;
      cursor: pointer;
      box-shadow: 0 6px 0 #a45f1e;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }

    button:hover {
      background: #ffe166;
      transform: translateY(-2px);
      box-shadow: 0 8px 0 #a45f1e;
    }

    button:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #a45f1e;
    }

    .primaryBtn {
      min-width: 190px;
      padding: 13px 22px;
    }

    .characterGrid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .characterCard {
      display: grid;
      place-items: center;
      gap: 10px;
      padding: 16px;
      background: #dff7ff;
    }

    .pixelHero {
      width: 78px;
      height: 96px;
      position: relative;
      image-rendering: pixelated;
    }

    .pixelHero span {
      position: absolute;
      display: block;
      border: 3px solid #12283f;
    }

    .pixelHero .hat { left: 16px; top: 4px; width: 46px; height: 18px; }
    .pixelHero .face { left: 18px; top: 22px; width: 42px; height: 25px; background: #ffd29c; }
    .pixelHero .body { left: 19px; top: 49px; width: 40px; height: 31px; }
    .pixelHero .legA { left: 16px; top: 78px; width: 18px; height: 16px; background: #263c9b; }
    .pixelHero .legB { right: 15px; top: 78px; width: 18px; height: 16px; background: #263c9b; }
    .pixelHero.red .hat,
    .pixelHero.red .body { background: #e43a2d; }
    .pixelHero.green .hat,
    .pixelHero.green .body { background: #2eb85d; }

    .questionPanel {
      width: min(720px, 94vw);
      padding: clamp(18px, 4vw, 30px);
      border: 5px solid #172c42;
      border-radius: 8px;
      background: #fff7d1;
      box-shadow: 0 10px 0 #b6782e;
    }

    #questionType {
      margin: 0 0 8px;
      font-weight: 900;
      color: #cf3a2f;
      letter-spacing: 0;
    }

    #questionText {
      min-height: 62px;
      margin: 0 0 18px;
      font-size: clamp(21px, 4vw, 32px);
      line-height: 1.25;
      font-weight: 900;
      color: #173957;
    }

    .answerGrid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .answerBtn {
      min-height: 54px;
      padding: 10px;
      background: #ffffff;
    }

    #mobileControls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 12px;
      display: none;
      justify-content: space-between;
      align-items: end;
      padding: 0 18px;
      pointer-events: none;
      z-index: 4;
    }

    .moveCluster {
      display: flex;
      gap: 12px;
    }

    .touchBtn {
      width: 64px;
      height: 58px;
      padding: 0;
      pointer-events: auto;
      background: rgba(255, 247, 209, 0.88);
      box-shadow: 0 5px 0 #885c2c;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }

    #jumpBtn {
      width: 82px;
      background: rgba(255, 207, 61, 0.92);
    }

    @media (max-width: 780px), (pointer: coarse) {
      #gameShell {
        width: 100vw;
        max-height: 100vh;
        border-width: 0;
        box-shadow: none;
      }

      #mobileControls {
        display: flex;
      }

      .characterGrid,
      .answerGrid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main id="gameShell" aria-label="Super Math World: Number Kingdom">
    <canvas id="gameCanvas" width="960" height="540"></canvas>

    <section id="startScreen" class="screen active">
      <div class="panel">
        <h1>Super Math World:<br>Number Kingdom</h1>
        <p class="subtitle">Y1 十位世界 0-99</p>
        <button id="startBtn" class="primaryBtn" type="button">开始游戏</button>
      </div>
    </section>

    <section id="characterScreen" class="screen">
      <div class="panel">
        <h2>选择角色</h2>
        <div class="characterGrid">
          <button class="characterCard" type="button" data-character="red">
            <span class="pixelHero red" aria-hidden="true">
              <span class="hat"></span><span class="face"></span><span class="body"></span><span class="legA"></span><span class="legB"></span>
            </span>
            红帽像素小勇士
          </button>
          <button class="characterCard" type="button" data-character="green">
            <span class="pixelHero green" aria-hidden="true">
              <span class="hat"></span><span class="face"></span><span class="body"></span><span class="legA"></span><span class="legB"></span>
            </span>
            绿帽像素小勇士
          </button>
        </div>
      </div>
    </section>

    <section id="successScreen" class="screen">
      <div class="panel">
        <h1>成功通关！</h1>
        <p class="subtitle">你完成了 Y1 十位世界。</p>
        <button id="playAgainBtn" class="primaryBtn" type="button">再玩一次</button>
      </div>
    </section>

    <section id="gameOverScreen" class="screen">
      <div class="panel">
        <h1>再试一次！</h1>
        <p class="subtitle">Number Kingdom 还在等你。</p>
        <button id="retryBtn" class="primaryBtn" type="button">重新开始</button>
      </div>
    </section>

    <section id="questionModal" class="modalShade" aria-modal="true">
      <div class="questionPanel">
        <p id="questionType"></p>
        <p id="questionText"></p>
        <div id="answerGrid" class="answerGrid"></div>
      </div>
    </section>

    <nav id="mobileControls" aria-label="手机控制">
      <div class="moveCluster">
        <button id="leftBtn" class="touchBtn" type="button">左</button>
        <button id="rightBtn" class="touchBtn" type="button">右</button>
      </div>
      <button id="jumpBtn" class="touchBtn" type="button">跳</button>
    </nav>
  </main>

  <script>
    "use strict";

    // =========================
    // CONFIG
    // =========================
    const CONFIG = {
      width: 960,
      height: 540,
      worldWidth: 2600,
      groundY: 462,
      gravity: 0.72,
      friction: 0.84,
      moveSpeed: 0.72,
      maxSpeed: 6.2,
      jumpPower: 15.2,
      scoreGoal: 50,
      maxHearts: 3,
      tile: 48,
      cameraPadding: 330
    };

    const COLORS = {
      outline: "#14283f",
      dirt: "#8e5127",
      dirtDark: "#5e351e",
      grass: "#36b552",
      grassLight: "#7ce05d",
      brick: "#c96a2c",
      brickLight: "#e99a42",
      question: "#f6c63a",
      questionLight: "#ffe46f",
      coin: "#ffd43b",
      coinDark: "#c98712",
      pipe: "#22a657",
      pipeDark: "#0e6836",
      pipeLight: "#67d86d"
    };

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;

    const skyImage = new Image();
    skyImage.src = "sky.png";

    // =========================
    // GAME STATE
    // =========================
    const game = {
      screen: "start",
      selectedCharacter: "red",
      score: 0,
      hearts: CONFIG.maxHearts,
      cameraX: 0,
      time: 0,
      lastTime: 0,
      questionOpen: false,
      currentQuestion: null,
      feedback: "",
      feedbackTimer: 0
    };

    let player;
    let enemies = [];
    let coins = [];
    let blocks = [];
    let platforms = [];
    let pipe;

    function showScreen(name) {
      game.screen = name;
      document.querySelectorAll(".screen").forEach((screen) => {
        screen.classList.toggle("active", screen.id === `${name}Screen`);
      });
    }

    function resetGame() {
      game.score = 0;
      game.hearts = CONFIG.maxHearts;
      game.cameraX = 0;
      game.time = 0;
      game.questionOpen = false;
      game.currentQuestion = null;
      game.feedback = "";
      game.feedbackTimer = 0;
      initPlayer();
      initEnemies();
      initCoins();
      initBlocks();
      initPipe();
      closeQuestion();
      showScreen("game");
    }

    // =========================
    // QUESTION BANK
    // =========================
    const QUESTION_TYPES = [
      makePlaceValueQuestion,
      makeRoundingQuestion,
      makePatternQuestion,
      makeCompareQuestion,
      makeAscendingQuestion,
      makeDescendingQuestion
    ];

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function shuffle(list) {
      return list
        .map((value) => ({ value, sort: Math.random() }))
        .sort((a, b) => a.sort - b.sort)
        .map((item) => item.value);
    }

    function uniqueNumbers(count, min, max) {
      const set = new Set();
      while (set.size < count) set.add(randomInt(min, max));
      return [...set];
    }

    function makeNumberOptions(answer, min, max, step = 1) {
      const values = new Set([answer]);
      const deltas = shuffle([step, -step, step * 2, -step * 2, step * 3, -step * 3, step * 4, -step * 4]);
      deltas.forEach((delta) => {
        const next = answer + delta;
        if (next >= min && next <= max) values.add(next);
      });
      while (values.size < 4) values.add(randomInt(min, max));
      return shuffle([...values]).slice(0, 4);
    }

    function makeQuestion() {
      return QUESTION_TYPES[randomInt(0, QUESTION_TYPES.length - 1)]();
    }

    function makePlaceValueQuestion() {
      const number = randomInt(10, 99);
      const askTens = Math.random() > 0.35;
      const answer = askTens ? Math.floor(number / 10) * 10 : number % 10;
      return {
        type: "数位数值",
        text: askTens ? `${number} 的十位数值是多少？` : `${number} 的个位数值是多少？`,
        answer: String(answer),
        choices: makeNumberOptions(answer, askTens ? 0 : 0, askTens ? 90 : 9, askTens ? 10 : 1).map(String)
      };
    }

    function makeRoundingQuestion() {
      const number = randomInt(0, 94);
      const answer = Math.round(number / 10) * 10;
      return {
        type: "近似值",
        text: `${number} 最接近哪一个十位数？`,
        answer: String(answer),
        choices: makeNumberOptions(answer, 0, 90, 10).map(String)
      };
    }

    function makePatternQuestion() {
      const step = shuffle([2, 5, 10])[0];
      const start = randomInt(0, 99 - step * 4);
      const answer = start + step * 3;
      return {
        type: "数列规律",
        text: `找规律：${start}, ${start + step}, ${start + step * 2}, __`,
        answer: String(answer),
        choices: makeNumberOptions(answer, 0, 99, step).map(String)
      };
    }

    function makeCompareQuestion() {
      const a = randomInt(0, 99);
      const b = randomInt(0, 99);
      const answer = a > b ? ">" : a < b ? "<" : "=";
      return {
        type: "比较大小",
        text: `${a} __ ${b}`,
        answer,
        choices: shuffle([">", "<", "="])
      };
    }

    function makeAscendingQuestion() {
      const numbers = uniqueNumbers(3, 0, 99);
      const answer = [...numbers].sort((a, b) => a - b).join(", ");
      const wrongA = [numbers[1], numbers[0], numbers[2]].join(", ");
      const wrongB = [...numbers].sort((a, b) => b - a).join(", ");
      const wrongC = [numbers[0], numbers[2], numbers[1]].join(", ");
      return {
        type: "顺序排列",
        text: `从小到大排列：${numbers.join(", ")}`,
        answer,
        choices: shuffle([...new Set([answer, wrongA, wrongB, wrongC])])
      };
    }

    function makeDescendingQuestion() {
      const numbers = uniqueNumbers(3, 0, 99);
      const answer = [...numbers].sort((a, b) => b - a).join(", ");
      const wrongA = [...numbers].sort((a, b) => a - b).join(", ");
      const wrongB = [numbers[1], numbers[2], numbers[0]].join(", ");
      const wrongC = [numbers[2], numbers[0], numbers[1]].join(", ");
      return {
        type: "逆序排列",
        text: `从大到小排列：${numbers.join(", ")}`,
        answer,
        choices: shuffle([...new Set([answer, wrongA, wrongB, wrongC])])
      };
    }

    function openQuestion() {
      game.questionOpen = true;
      game.currentQuestion = makeQuestion();
      const modal = document.getElementById("questionModal");
      const type = document.getElementById("questionType");
      const text = document.getElementById("questionText");
      const grid = document.getElementById("answerGrid");
      type.textContent = game.currentQuestion.type;
      text.textContent = game.currentQuestion.text;
      grid.innerHTML = "";
      game.currentQuestion.choices.forEach((choice) => {
        const button = document.createElement("button");
        button.className = "answerBtn";
        button.type = "button";
        button.textContent = choice;
        button.addEventListener("click", () => answerQuestion(choice));
        grid.appendChild(button);
      });
      modal.classList.add("active");
    }

    function closeQuestion() {
      document.getElementById("questionModal").classList.remove("active");
    }

    function answerQuestion(choice) {
      if (!game.currentQuestion) return;
      if (choice === game.currentQuestion.answer) {
        game.score += 10;
        game.feedback = "+10 答对了！";
      } else {
        loseHeart();
        game.feedback = `答案：${game.currentQuestion.answer}`;
      }
      game.feedbackTimer = 100;
      game.questionOpen = false;
      game.currentQuestion = null;
      closeQuestion();
    }

    // =========================
    // PLAYER
    // =========================
    const CHARACTER_STYLES = {
      red: { hat: "#e43a2d", shirt: "#e43a2d", pants: "#2446a5", skin: "#ffd19b" },
      green: { hat: "#2eb85d", shirt: "#2eb85d", pants: "#2446a5", skin: "#ffd19b" }
    };

    function initPlayer() {
      player = {
        x: 70,
        y: CONFIG.groundY - 62,
        prevX: 70,
        prevY: CONFIG.groundY - 62,
        w: 34,
        h: 62,
        vx: 0,
        vy: 0,
        face: 1,
        onGround: false,
        invincible: 0
      };

      platforms = [
        { x: 420, y: 348, w: 190, h: 26 },
        { x: 910, y: 315, w: 170, h: 26 },
        { x: 1370, y: 355, w: 210, h: 26 },
        { x: 1810, y: 318, w: 180, h: 26 }
      ];
    }

    function updatePlayer() {
      player.prevX = player.x;
      player.prevY = player.y;

      if (input.left) player.vx -= CONFIG.moveSpeed;
      if (input.right) player.vx += CONFIG.moveSpeed;
      if (!input.left && !input.right) player.vx *= CONFIG.friction;

      player.vx = Math.max(-CONFIG.maxSpeed, Math.min(CONFIG.maxSpeed, player.vx));
      if (Math.abs(player.vx) > 0.2) player.face = player.vx > 0 ? 1 : -1;

      if (input.jumpPressed && player.onGround) {
        player.vy = -CONFIG.jumpPower;
        player.onGround = false;
      }
      input.jumpPressed = false;

      player.vy += CONFIG.gravity;
      player.x += player.vx;
      player.y += player.vy;
      player.x = Math.max(0, Math.min(CONFIG.worldWidth - player.w, player.x));

      resolvePlatformCollisions();

      if (player.y + player.h >= CONFIG.groundY) {
        player.y = CONFIG.groundY - player.h;
        player.vy = 0;
        player.onGround = true;
      }

      if (player.invincible > 0) player.invincible -= 1;
    }

    function resolvePlatformCollisions() {
      player.onGround = false;
      platforms.forEach((platform) => {
        if (!rectsOverlap(player, platform)) return;
        const wasAbove = player.prevY + player.h <= platform.y;
        const wasBelow = player.prevY >= platform.y + platform.h;

        if (wasAbove && player.vy >= 0) {
          player.y = platform.y - player.h;
          player.vy = 0;
          player.onGround = true;
        } else if (wasBelow && player.vy < 0) {
          player.y = platform.y + platform.h;
          player.vy = 1.5;
        }
      });
    }

    function drawPlayer() {
      const style = CHARACTER_STYLES[game.selectedCharacter];
      const x = Math.round(player.x - game.cameraX);
      const y = Math.round(player.y);
      const blink = player.invincible > 0 && Math.floor(game.time / 6) % 2 === 0;
      if (blink) return;

      ctx.save();
      if (player.face < 0) {
        ctx.translate(x + player.w, 0);
        ctx.scale(-1, 1);
        drawPixelHero(0, y, style);
      } else {
        drawPixelHero(x, y, style);
      }
      ctx.restore();
    }

    function drawPixelHero(x, y, style) {
      strokeRect(x + 6, y + 0, 23, 10, style.hat);
      strokeRect(x + 3, y + 10, 29, 9, style.hat);
      strokeRect(x + 8, y + 19, 22, 17, style.skin);
      strokeRect(x + 22, y + 24, 5, 5, COLORS.outline);
      strokeRect(x + 4, y + 36, 28, 24, style.shirt);
      strokeRect(x + 1, y + 40, 8, 18, style.skin);
      strokeRect(x + 27, y + 40, 8, 18, style.skin);
      strokeRect(x + 6, y + 58, 10, 13, style.pants);
      strokeRect(x + 21, y + 58, 10, 13, style.pants);
      strokeRect(x + 4, y + 70, 13, 6, "#4b2817");
      strokeRect(x + 20, y + 70, 13, 6, "#4b2817");
    }

    // =========================
    // ENEMIES
    // =========================
    function initEnemies() {
      enemies = [
        { x: 650, y: CONFIG.groundY - 34, w: 38, h: 34, vx: 1.3, minX: 610, maxX: 850 },
        { x: 1600, y: CONFIG.groundY - 34, w: 38, h: 34, vx: -1.1, minX: 1500, maxX: 1760 }
      ];
    }

    function updateEnemies() {
      enemies.forEach((enemy) => {
        enemy.x += enemy.vx;
        if (enemy.x < enemy.minX || enemy.x + enemy.w > enemy.maxX) enemy.vx *= -1;
        if (rectsOverlap(player, enemy)) {
          hurtPlayer(enemy.x < player.x ? 1 : -1);
        }
      });
    }

    function drawEnemies() {
      enemies.forEach((enemy) => {
        const x = Math.round(enemy.x - game.cameraX);
        const y = Math.round(enemy.y);
        strokeRect(x + 3, y + 8, enemy.w - 6, enemy.h - 8, "#9b5a35");
        strokeRect(x + 8, y + 2, enemy.w - 16, 12, "#b87545");
        strokeRect(x + 10, y + 16, 5, 5, "#ffffff");
        strokeRect(x + 23, y + 16, 5, 5, "#ffffff");
        fillRect(x + 12, y + 18, 3, 3, COLORS.outline);
        fillRect(x + 25, y + 18, 3, 3, COLORS.outline);
        fillRect(x + 5, y + 30, 10, 5, COLORS.outline);
        fillRect(x + 23, y + 30, 10, 5, COLORS.outline);
      });
    }

    function hurtPlayer(direction) {
      if (player.invincible > 0 || game.screen !== "game") return;
      loseHeart();
      player.invincible = 90;
      player.vx = direction * 8;
      player.vy = -8;
    }

    function loseHeart() {
      game.hearts -= 1;
      if (game.hearts <= 0) {
        game.hearts = 0;
        showScreen("gameOver");
      }
    }

    // =========================
    // COINS
    // =========================
    function initCoins() {
      coins = [
        { x: 300, y: 385 }, { x: 360, y: 360 }, { x: 470, y: 300 },
        { x: 960, y: 260 }, { x: 1030, y: 260 }, { x: 1260, y: 390 },
        { x: 1460, y: 304 }, { x: 1530, y: 304 }, { x: 1880, y: 270 },
        { x: 2140, y: 385 }
      ].map((coin) => ({ ...coin, w: 26, h: 26, collected: false }));
    }

    function updateCoins() {
      coins.forEach((coin) => {
        if (!coin.collected && rectsOverlap(player, coin)) {
          coin.collected = true;
          game.score += 1;
          game.feedback = "+1";
          game.feedbackTimer = 45;
        }
      });
    }

    function drawCoins() {
      coins.forEach((coin, index) => {
        if (coin.collected) return;
        const pulse = Math.sin(game.time * 0.16 + index) * 0.35 + 0.65;
        const width = Math.max(8, coin.w * pulse);
        const x = Math.round(coin.x - game.cameraX + (coin.w - width) / 2);
        const y = Math.round(coin.y + Math.sin(game.time * 0.09 + index) * 3);
        strokeRect(x, y, width, coin.h, COLORS.coin);
        fillRect(x + width * 0.42, y + 5, Math.max(3, width * 0.18), coin.h - 10, COLORS.coinDark);
        fillRect(x + 5, y + 4, Math.max(3, width * 0.22), 4, "#fff4a4");
      });
    }

    // =========================
    // BLOCKS
    // =========================
    function initBlocks() {
      blocks = [
        { x: 250, y: 305 },
        { x: 520, y: 250 },
        { x: 820, y: 285 },
        { x: 1150, y: 300 },
        { x: 1490, y: 255 },
        { x: 1900, y: 250 },
        { x: 2090, y: 315 }
      ].map((block) => ({ ...block, w: 46, h: 46, used: false, bump: 0 }));
    }

    function updateBlocks() {
      blocks.forEach((block) => {
        if (block.bump > 0) block.bump -= 1;
        if (block.used || game.questionOpen) return;

        const hitNow = rectsOverlap(player, block);
        const wasBelow = player.prevY >= block.y + block.h - 2;
        if (hitNow && wasBelow && player.vy < 0) {
          player.y = block.y + block.h + 1;
          player.vy = 4;
          block.used = true;
          block.bump = 14;
          openQuestion();
        }
      });
    }

    function drawBlocks() {
      blocks.forEach((block) => {
        const bumpOffset = block.bump > 0 ? -Math.sin((block.bump / 14) * Math.PI) * 12 : 0;
        const x = Math.round(block.x - game.cameraX);
        const y = Math.round(block.y + bumpOffset);
        const color = block.used ? "#a17b59" : COLORS.question;
        strokeRect(x, y, block.w, block.h, color);
        fillRect(x + 5, y + 5, block.w - 10, 8, block.used ? "#c8a27b" : COLORS.questionLight);
        if (!block.used) {
          ctx.fillStyle = COLORS.outline;
          ctx.font = "900 30px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("?", x + block.w / 2, y + block.h / 2 + 1);
        }
      });
    }

    // =========================
    // PIPE
    // =========================
    function initPipe() {
      pipe = { x: 2370, y: CONFIG.groundY - 96, w: 82, h: 96 };
    }

    function updatePipe() {
      if (game.score >= CONFIG.scoreGoal && rectsOverlap(player, pipe)) {
        showScreen("success");
      }
    }

    function drawPipe() {
      const x = Math.round(pipe.x - game.cameraX);
      const y = Math.round(pipe.y);
      strokeRect(x + 10, y + 24, pipe.w - 20, pipe.h - 24, COLORS.pipe);
      strokeRect(x, y, pipe.w, 32, COLORS.pipe);
      fillRect(x + 14, y + 4, 14, pipe.h - 10, COLORS.pipeLight);
      fillRect(x + pipe.w - 20, y + 4, 10, pipe.h - 10, COLORS.pipeDark);
      ctx.fillStyle = game.score >= CONFIG.scoreGoal ? "#ffffff" : "#173957";
      ctx.font = "900 17px Trebuchet MS";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(game.score >= CONFIG.scoreGoal ? "GO!" : "50", x + pipe.w / 2, y + 17);
    }

    // =========================
    // INPUT
    // =========================
    const input = {
      left: false,
      right: false,
      jump: false,
      jumpPressed: false
    };

    function setJump(value) {
      if (value && !input.jump) input.jumpPressed = true;
      input.jump = value;
    }

    window.addEventListener("keydown", (event) => {
      if (event.code === "ArrowLeft") input.left = true;
      if (event.code === "ArrowRight") input.right = true;
      if (event.code === "Space") setJump(true);
      if (["ArrowLeft", "ArrowRight", "Space"].includes(event.code)) event.preventDefault();
    });

    window.addEventListener("keyup", (event) => {
      if (event.code === "ArrowLeft") input.left = false;
      if (event.code === "ArrowRight") input.right = false;
      if (event.code === "Space") setJump(false);
    });

    function bindTouchButton(id, onDown, onUp) {
      const button = document.getElementById(id);
      const start = (event) => {
        event.preventDefault();
        if (event.pointerId && button.setPointerCapture) button.setPointerCapture(event.pointerId);
        onDown();
      };
      const end = (event) => {
        event.preventDefault();
        if (event.pointerId && button.releasePointerCapture) {
          try {
            button.releasePointerCapture(event.pointerId);
          } catch (error) {
            // The pointer may already be released by the browser.
          }
        }
        onUp();
      };
      button.addEventListener("pointerdown", start, { passive: false });
      button.addEventListener("pointerup", end, { passive: false });
      button.addEventListener("pointercancel", end, { passive: false });
      button.addEventListener("pointerleave", end, { passive: false });
      button.addEventListener("touchstart", start, { passive: false });
      button.addEventListener("touchend", end, { passive: false });
      button.addEventListener("touchcancel", end, { passive: false });
    }

    bindTouchButton("leftBtn", () => input.left = true, () => input.left = false);
    bindTouchButton("rightBtn", () => input.right = true, () => input.right = false);
    bindTouchButton("jumpBtn", () => setJump(true), () => setJump(false));

    document.getElementById("startBtn").addEventListener("click", () => showScreen("character"));
    document.querySelectorAll("[data-character]").forEach((button) => {
      button.addEventListener("click", () => {
        game.selectedCharacter = button.dataset.character;
        resetGame();
      });
    });
    document.getElementById("playAgainBtn").addEventListener("click", () => showScreen("character"));
    document.getElementById("retryBtn").addEventListener("click", () => showScreen("character"));

    ["contextmenu", "selectstart", "dragstart"].forEach((eventName) => {
      document.addEventListener(eventName, (event) => event.preventDefault(), { passive: false });
    });

    // =========================
    // UPDATE
    // =========================
    function update(timestamp = 0) {
      const delta = Math.min(32, timestamp - game.lastTime || 16);
      game.lastTime = timestamp;

      if (game.screen === "game" && !game.questionOpen) {
        game.time += delta / 16.67;
        updatePlayer();
        updateEnemies();
        updateCoins();
        updateBlocks();
        updatePipe();
        updateCamera();
        if (game.feedbackTimer > 0) game.feedbackTimer -= 1;
      } else {
        game.time += delta / 30;
      }

      draw();
      requestAnimationFrame(update);
    }

    function updateCamera() {
      const target = player.x - CONFIG.cameraPadding;
      game.cameraX += (target - game.cameraX) * 0.08;
      game.cameraX = Math.max(0, Math.min(CONFIG.worldWidth - CONFIG.width, game.cameraX));
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    // =========================
    // DRAW
    // =========================
    function draw() {
      drawBackground();
      drawScenery();
      drawPlatforms();
      drawCoins();
      drawBlocks();
      if (pipe) drawPipe();
      drawEnemies();
      if (player) drawPlayer();
      drawHud();
    }

    function drawBackground() {
      const skyReady = skyImage.complete && skyImage.naturalWidth > 0;
      if (skyReady) {
        const parallax = (game.cameraX * 0.25) % CONFIG.width;
        drawSkyCover(-parallax);
        drawSkyCover(CONFIG.width - parallax);
      } else {
        const gradient = ctx.createLinearGradient(0, 0, 0, CONFIG.height);
        gradient.addColorStop(0, "#75d8ff");
        gradient.addColorStop(0.62, "#bdf4ff");
        gradient.addColorStop(1, "#fff0aa");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, CONFIG.width, CONFIG.height);
        drawCloud(120 - (game.cameraX * 0.18) % 1120, 82, 1);
        drawCloud(610 - (game.cameraX * 0.12) % 1180, 120, 1.25);
        drawCloud(980 - (game.cameraX * 0.16) % 1200, 62, 0.85);
      }
    }

    function drawSkyCover(dx) {
      const sourceRatio = skyImage.naturalWidth / skyImage.naturalHeight;
      const targetRatio = CONFIG.width / CONFIG.height;
      let sx = 0;
      let sy = 0;
      let sw = skyImage.naturalWidth;
      let sh = skyImage.naturalHeight;

      if (sourceRatio > targetRatio) {
        sw = skyImage.naturalHeight * targetRatio;
        sx = (skyImage.naturalWidth - sw) / 2;
      } else {
        sh = skyImage.naturalWidth / targetRatio;
        sy = (skyImage.naturalHeight - sh) / 2;
      }

      ctx.drawImage(skyImage, sx, sy, sw, sh, dx, 0, CONFIG.width, CONFIG.height);
    }

    function drawScenery() {
      drawHill(160 - game.cameraX * 0.38, CONFIG.groundY, 180, "#6cd36a");
      drawHill(760 - game.cameraX * 0.34, CONFIG.groundY, 250, "#44bb64");
      drawHill(1420 - game.cameraX * 0.36, CONFIG.groundY, 220, "#66cf6b");
      drawHill(2160 - game.cameraX * 0.32, CONFIG.groundY, 260, "#43b960");
    }

    function drawPlatforms() {
      drawGround();
      platforms.forEach((platform) => {
        const x = Math.round(platform.x - game.cameraX);
        strokeRect(x, platform.y, platform.w, platform.h, COLORS.brick);
        for (let i = 0; i < platform.w; i += 36) {
          fillRect(x + i + 3, platform.y + 4, 26, 5, COLORS.brickLight);
        }
      });
    }

    function drawGround() {
      fillRect(0, CONFIG.groundY, CONFIG.width, CONFIG.height - CONFIG.groundY, COLORS.dirt);
      fillRect(0, CONFIG.groundY, CONFIG.width, 18, COLORS.grass);
      for (let x = -Math.floor(game.cameraX % CONFIG.tile); x < CONFIG.width; x += CONFIG.tile) {
        fillRect(x, CONFIG.groundY + 18, 4, CONFIG.height - CONFIG.groundY, COLORS.dirtDark);
        fillRect(x + 4, CONFIG.groundY + 4, 22, 6, COLORS.grassLight);
      }
    }

    function drawHud() {
      strokeRect(18, 17, 190, 46, "#fff7d1");
      ctx.fillStyle = COLORS.outline;
      ctx.font = "900 22px Trebuchet MS";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText(`分数 ${game.score}`, 34, 40);

      for (let i = 0; i < CONFIG.maxHearts; i += 1) {
        drawHeart(760 + i * 52, 26, i < game.hearts ? "#e73b47" : "#b6c2c9");
      }

      if (game.feedbackTimer > 0 && game.feedback) {
        ctx.fillStyle = "#fff7d1";
        ctx.strokeStyle = COLORS.outline;
        ctx.lineWidth = 4;
        ctx.font = "900 26px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.strokeText(game.feedback, CONFIG.width / 2, 82);
        ctx.fillText(game.feedback, CONFIG.width / 2, 82);
      }
    }

    function drawHeart(x, y, color) {
      fillRect(x + 8, y, 12, 12, color);
      fillRect(x + 28, y, 12, 12, color);
      fillRect(x, y + 10, 48, 18, color);
      fillRect(x + 8, y + 28, 32, 10, color);
      fillRect(x + 18, y + 38, 12, 8, color);
      ctx.strokeStyle = COLORS.outline;
      ctx.lineWidth = 3;
      ctx.strokeRect(x + 1, y + 10, 46, 18);
    }

    function drawCloud(x, y, scale) {
      ctx.fillStyle = "rgba(255,255,255,0.88)";
      ctx.beginPath();
      ctx.arc(x, y + 22 * scale, 23 * scale, 0, Math.PI * 2);
      ctx.arc(x + 28 * scale, y + 7 * scale, 30 * scale, 0, Math.PI * 2);
      ctx.arc(x + 66 * scale, y + 20 * scale, 25 * scale, 0, Math.PI * 2);
      ctx.fill();
      fillRect(x - 12 * scale, y + 24 * scale, 92 * scale, 22 * scale, "rgba(255,255,255,0.88)");
    }

    function drawHill(x, ground, radius, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, ground + radius * 0.45, radius, Math.PI, 0);
      ctx.lineTo(x + radius, ground + 60);
      ctx.lineTo(x - radius, ground + 60);
      ctx.closePath();
      ctx.fill();
    }

    function fillRect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
    }

    function strokeRect(x, y, w, h, color) {
      fillRect(x, y, w, h, color);
      ctx.strokeStyle = COLORS.outline;
      ctx.lineWidth = 3;
      ctx.strokeRect(Math.round(x) + 1.5, Math.round(y) + 1.5, Math.round(w) - 3, Math.round(h) - 3);
    }

    requestAnimationFrame(update);
  </script>
</body>
</html>
