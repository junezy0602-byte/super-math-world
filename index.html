<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Super Math World: Number Kingdom</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      font-family: "Trebuchet MS", Arial, sans-serif;
      color: #1d2440;
      background:
        linear-gradient(rgba(255, 255, 255, .22), rgba(255, 255, 255, .08)),
        url("sky.png") center / cover fixed no-repeat,
        linear-gradient(#7bd1ff, #dff8ff);
    }

    .shell {
      width: min(100vw, 1120px);
      padding: 10px;
    }

    .game-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border: 5px solid #2b2b2b;
      border-radius: 8px;
      background:
        linear-gradient(rgba(112, 198, 255, .2), rgba(112, 198, 255, .12)),
        url("sky.png") center / cover no-repeat,
        linear-gradient(#7bd1ff, #dbf8ff);
      box-shadow: 0 18px 40px rgba(0, 0, 0, .28);
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      overflow-y: auto;
      background: rgba(42, 139, 213, .28);
      backdrop-filter: blur(2px);
    }

    .overlay.active {
      display: flex;
    }

    .panel {
      width: min(720px, 94%);
      max-height: calc(100% - 18px);
      overflow-y: auto;
      padding: 22px;
      border: 5px solid #6d421d;
      border-radius: 8px;
      background: #fff8dc;
      box-shadow: 0 8px 0 #4e2d14, 0 20px 30px rgba(0, 0, 0, .24);
      text-align: center;
    }

    h1, h2, p {
      margin: 0;
    }

    h1 {
      font-size: clamp(30px, 6vw, 58px);
      line-height: .98;
      color: #e53935;
      text-shadow: 3px 3px 0 #ffd447, 5px 5px 0 #2c5aa0;
    }

    h2 {
      margin-bottom: 14px;
      font-size: clamp(22px, 3.6vw, 34px);
      color: #2c5aa0;
    }

    .tagline {
      max-width: 560px;
      margin: 16px auto 22px;
      font-size: clamp(15px, 2.2vw, 19px);
      line-height: 1.45;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 10px 18px;
      color: #fff;
      font: 900 17px "Trebuchet MS", Arial, sans-serif;
      cursor: pointer;
      background: #2c5aa0;
      box-shadow: inset 0 -4px 0 rgba(0, 0, 0, .25), 0 4px 0 rgba(0, 0, 0, .28);
      touch-action: manipulation;
    }

    button:active,
    button.pressed {
      transform: translateY(3px);
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, .25), 0 1px 0 rgba(0, 0, 0, .28);
    }

    .primary {
      background: #e53935;
    }

    .choice-grid,
    .answer-grid,
    .button-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .choice-card {
      width: min(260px, 42vw);
      min-height: 178px;
      padding: 14px;
      border: 4px solid #292929;
      border-radius: 8px;
      background: #fff;
      color: #1d2440;
    }

    .choice-card.selected {
      outline: 5px solid #ffd447;
    }

    .pixel-preview {
      width: 92px;
      height: 92px;
      margin: 0 auto 10px;
      border: 3px solid #333;
      background: #bdeeff;
    }

    .answer-grid {
      margin-top: 18px;
    }

    .answer-grid button {
      min-width: 132px;
      background: #39a85c;
    }

    .feedback {
      min-height: 24px;
      margin-top: 12px;
      font-weight: 900;
    }

    .music-toggle {
      position: absolute;
      top: 74px;
      right: 18px;
      z-index: 4;
      min-height: 36px;
      padding: 7px 12px;
      border: 3px solid rgba(255, 255, 255, .85);
      font-size: 14px;
      background: rgba(31, 55, 91, .86);
    }

    .mobile-controls {
      position: absolute;
      inset: auto 0 12px 0;
      z-index: 3;
      display: none;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 18px;
      pointer-events: none;
    }

    .mobile-cluster {
      display: flex;
      gap: 12px;
      pointer-events: auto;
    }

    .mobile-controls button {
      width: 62px;
      height: 58px;
      min-height: 58px;
      padding: 0;
      border: 3px solid rgba(255, 255, 255, .82);
      border-radius: 50%;
      font-size: 20px;
      background: rgba(31, 55, 91, .86);
      touch-action: none;
    }

    #jumpBtn {
      width: 78px;
      height: 78px;
      min-height: 78px;
      background: rgba(220, 56, 56, .9);
    }

    @media (hover: none), (max-width: 760px) {
      .shell {
        width: 100vw;
        padding: 6px;
      }

      .game-frame {
        margin-top: 4px;
      }

      .mobile-controls {
        display: flex;
      }

      .panel {
        padding: 16px;
      }

      .choice-card {
        width: 100%;
        min-height: 128px;
      }

      .pixel-preview {
        width: 68px;
        height: 68px;
      }

      .mobile-controls button {
        width: 58px;
        height: 54px;
        min-height: 54px;
        font-size: 18px;
      }

      #jumpBtn {
        width: 74px;
        height: 74px;
        min-height: 74px;
      }

      .music-toggle {
        top: 62px;
        right: 10px;
        font-size: 13px;
      }
    }

    @media (max-height: 520px) and (orientation: landscape) {
      .shell {
        width: min(100vw, 960px);
        padding: 2px;
      }

      .game-frame {
        width: min(100vw, calc(100dvh * 16 / 9));
        max-height: 100dvh;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="game-frame" aria-label="Super Math World: Number Kingdom game">
      <canvas id="gameCanvas" width="960" height="540"></canvas>
      <button id="musicBtn" class="music-toggle" type="button" aria-pressed="true">音乐 开</button>
      <audio id="gameMusic" src="pixel-quest-run.mp3" loop preload="auto"></audio>

      <div id="startScreen" class="overlay active">
        <div class="panel">
          <h1>Super Math World:<br />Number Kingdom</h1>
          <p class="tagline">Y1 十位世界。撞问号砖块答题，答对加分，集满 50 分进入管道通关。</p>
          <div class="button-row"><button id="startBtn" class="primary" type="button">开始游戏</button></div>
          <p class="tagline">键盘：左右方向键移动，Space 跳跃</p>
        </div>
      </div>

      <div id="characterScreen" class="overlay">
        <div class="panel">
          <h2>选择角色</h2>
          <div class="choice-grid">
            <button class="choice-card selected" data-character="red" aria-label="选择 Red Jumper">
              <canvas class="pixel-preview" width="92" height="92" data-preview="red"></canvas>
              <strong>Red Jumper</strong>
            </button>
            <button class="choice-card" data-character="green" aria-label="选择 Green Jumper">
              <canvas class="pixel-preview" width="92" height="92" data-preview="green"></canvas>
              <strong>Green Jumper</strong>
            </button>
          </div>
          <div class="button-row" style="margin-top:18px;"><button id="playBtn" class="primary" type="button">进入十位世界</button></div>
        </div>
      </div>

      <div id="questionScreen" class="overlay">
        <div class="panel">
          <h2 id="questionTitle">数学挑战</h2>
          <p id="questionText" class="tagline"></p>
          <div id="answerGrid" class="answer-grid"></div>
          <p id="feedback" class="feedback"></p>
        </div>
      </div>

      <div id="successScreen" class="overlay">
        <div class="panel">
          <h1>Level Clear!</h1>
          <p class="tagline">你完成了 Y1 十位世界。</p>
          <button id="restartWinBtn" class="primary" type="button">再玩一次</button>
        </div>
      </div>

      <div id="gameOverScreen" class="overlay">
        <div class="panel">
          <h1>Game Over</h1>
          <p class="tagline">生命用完了，再挑战一次吧。</p>
          <button id="restartLoseBtn" class="primary" type="button">重新开始</button>
        </div>
      </div>

      <div class="mobile-controls" aria-label="手机控制按钮">
        <div class="mobile-cluster">
          <button id="leftBtn" type="button">左</button>
          <button id="rightBtn" type="button">右</button>
        </div>
        <button id="jumpBtn" type="button">跳</button>
      </div>
    </section>
  </main>

  <script>
    "use strict";

    // ============================================================
    // CONFIG
    // ============================================================
    const CONFIG = {
      canvasWidth: 960,
      canvasHeight: 540,
      worldWidth: 2460,
      gravity: 0.72,
      moveSpeed: 4.2,
      jumpPower: 15.8,
      maxFallSpeed: 18,
      groundY: 468,
      passScore: 50,
      maxHearts: 3,
      playerWidth: 34,
      playerHeight: 48,
      questionDelay: 680,
      enemyCooldown: 1200
    };

    // ============================================================
    // GAME STATE
    // ============================================================
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const screens = {
      start: document.getElementById("startScreen"),
      character: document.getElementById("characterScreen"),
      question: document.getElementById("questionScreen"),
      success: document.getElementById("successScreen"),
      gameOver: document.getElementById("gameOverScreen")
    };
    const questionTitle = document.getElementById("questionTitle");
    const questionText = document.getElementById("questionText");
    const answerGrid = document.getElementById("answerGrid");
    const feedback = document.getElementById("feedback");
    const musicBtn = document.getElementById("musicBtn");
    const gameMusic = document.getElementById("gameMusic");
    const skyImage = new Image();
    skyImage.src = "sky.png";
    gameMusic.volume = 0.38;

    const game = {
      mode: "start",
      character: "red",
      score: 0,
      hearts: CONFIG.maxHearts,
      coins: 0,
      cameraX: 0,
      animationTime: 0,
      currentQuestion: null,
      questionSource: "block",
      activeEnemy: null,
      musicOn: true,
      message: "Y1 十位世界",
      messageUntil: 0
    };

    function hideScreens() {
      Object.values(screens).forEach((screen) => screen.classList.remove("active"));
    }

    function resetGame() {
      game.mode = "playing";
      game.score = 0;
      game.hearts = CONFIG.maxHearts;
      game.coins = 0;
      game.cameraX = 0;
      game.currentQuestion = null;
      game.questionSource = "block";
      game.activeEnemy = null;
      game.message = "撞问号砖块回答数学题";
      game.messageUntil = performance.now() + 2400;
      resetPlayer();
      resetCoins();
      resetBlocks();
      resetEnemies();
      hideScreens();
      if (game.musicOn) startMusic();
    }

    function setMessage(text, duration = 1800) {
      game.message = text;
      game.messageUntil = performance.now() + duration;
    }

    // ============================================================
    // AUDIO
    // ============================================================
    const audio = { context: null, master: null };

    function ensureAudio() {
      if (audio.context) return;
      const AudioCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtor) return;
      audio.context = new AudioCtor();
      audio.master = audio.context.createGain();
      audio.master.gain.value = 0.24;
      audio.master.connect(audio.context.destination);
    }

    function playTone(frequency, duration = 0.12, type = "square", volume = 0.42) {
      ensureAudio();
      if (!audio.context || !audio.master) return;
      const now = audio.context.currentTime;
      const oscillator = audio.context.createOscillator();
      const gain = audio.context.createGain();
      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, now);
      gain.gain.setValueAtTime(0.001, now);
      gain.gain.linearRampToValueAtTime(volume, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
      oscillator.connect(gain);
      gain.connect(audio.master);
      oscillator.start(now);
      oscillator.stop(now + duration + 0.03);
    }

    function startMusic() {
      ensureAudio();
      if (audio.context) audio.context.resume();
      game.musicOn = true;
      musicBtn.textContent = "音乐 开";
      musicBtn.setAttribute("aria-pressed", "true");
      const promise = gameMusic.play();
      if (promise) promise.catch(() => {
        game.musicOn = false;
        musicBtn.textContent = "点我播放音乐";
        musicBtn.setAttribute("aria-pressed", "false");
      });
    }

    function stopMusic() {
      game.musicOn = false;
      musicBtn.textContent = "音乐 关";
      musicBtn.setAttribute("aria-pressed", "false");
      gameMusic.pause();
    }

    function playSfx(kind) {
      const sounds = {
        coin: [[1047, .06], [1568, .08], [2093, .1]],
        jump: [[392, .08], [523, .1]],
        correct: [[659, .07], [880, .08], [1175, .09], [1568, .15]],
        wrong: [[220, .16], [165, .2]],
        hit: [[196, .11], [147, .14]]
      };
      (sounds[kind] || []).forEach(([f, d], i) => {
        setTimeout(() => playTone(f, d, kind === "coin" ? "triangle" : "square"), i * 70);
      });
    }

    // ============================================================
    // QUESTION BANK
    // ============================================================
    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function shuffle(items) {
      const copy = items.slice();
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = randInt(0, i);
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function numberChoices(answer, extras = []) {
      const unique = [answer, ...extras].filter((n, i, arr) => n >= 0 && n <= 99 && arr.indexOf(n) === i);
      while (unique.length < 4) {
        const next = Math.max(0, Math.min(99, answer + randInt(-18, 18)));
        if (!unique.includes(next)) unique.push(next);
      }
      return shuffle(unique.slice(0, 4)).map(String);
    }

    function digitChoices(answer) {
      const unique = [answer, answer - 1, answer + 1, answer - 2, answer + 2].filter((n, i, arr) => n >= 0 && n <= 9 && arr.indexOf(n) === i);
      while (unique.length < 4) {
        const next = randInt(0, 9);
        if (!unique.includes(next)) unique.push(next);
      }
      return shuffle(unique.slice(0, 4)).map(String);
    }

    function tenChoices(answer) {
      const unique = [answer, answer - 10, answer + 10, answer - 20, answer + 20].filter((n, i, arr) => n >= 0 && n <= 90 && n % 10 === 0 && arr.indexOf(n) === i);
      while (unique.length < 4) {
        const next = randInt(0, 9) * 10;
        if (!unique.includes(next)) unique.push(next);
      }
      return shuffle(unique.slice(0, 4)).map(String);
    }

    function makePlaceValueQuestion() {
      const n = randInt(10, 99);
      const askTens = Math.random() > .45;
      const answer = askTens ? Math.floor(n / 10) : n % 10;
      return {
        title: "数位数值",
        text: askTens ? `${n} 里面有几个十？` : `${n} 的个位数字是几？`,
        answer: String(answer),
        choices: digitChoices(answer)
      };
    }

    function makeRoundingQuestion() {
      const n = randInt(0, 94);
      const answer = Math.round(n / 10) * 10;
      return { title: "十位近似值", text: `${n} 的十位近似值是？`, answer: String(answer), choices: tenChoices(answer) };
    }

    function makePatternQuestion() {
      const step = shuffle([2, 5, 10])[0];
      const start = randInt(0, 99 - step * 4);
      const answer = start + step * 4;
      return { title: "数列规律", text: `${start}，${start + step}，${start + step * 2}，${start + step * 3}，下一个是？`, answer: String(answer), choices: numberChoices(answer, [answer + step, answer - step, answer + 1]) };
    }

    function makeBeforeAfterQuestion() {
      const direction = shuffle(["加10", "减10", "前一个数", "下一个数"])[0];
      const n = randInt(10, 89);
      let answer = n;
      let text = `${n} 前一个是？`;
      if (direction === "下一个数") { answer = n + 1; text = `${n} 下一个是？`; }
      if (direction === "加10") { answer = n + 10; text = `${n} + 10 = ?`; }
      if (direction === "减10") { answer = n - 10; text = `${n} - 10 = ?`; }
      return { title: "前后与十位", text, answer: String(answer), choices: numberChoices(answer, [answer + 10, answer - 10, answer + 1]) };
    }

    function makeComposeQuestion() {
      const tens = randInt(1, 9);
      const ones = randInt(0, 9);
      const answer = tens * 10 + ones;
      return { title: "数位组成", text: `${tens} 个十和 ${ones} 个一组成多少？`, answer: String(answer), choices: numberChoices(answer, [answer + 10, answer - 10, tens + ones]) };
    }

    function makeCompareQuestion() {
      let a = randInt(0, 99);
      let b = randInt(0, 99);
      while (a === b) b = randInt(0, 99);
      const answer = a > b ? "大" : "小";
      return { title: "比较大小", text: `${a} 比 ${b} 大还是小？`, answer, choices: shuffle(["大", "小"]) };
    }

    function makeOrderQuestion(ascending = true) {
      const nums = [];
      while (nums.length < 4) {
        const n = randInt(0, 99);
        if (!nums.includes(n)) nums.push(n);
      }
      const answer = nums.slice().sort((a, b) => ascending ? a - b : b - a).join("，");
      const set = new Set([answer, nums.slice().reverse().join("，"), shuffle(nums).join("，"), nums.slice().sort((a, b) => ascending ? b - a : a - b).join("，")]);
      while (set.size < 4) set.add(shuffle(nums).join("，"));
      return { title: ascending ? "顺序排列" : "逆序排列", text: `把 ${nums.join("，")} 按${ascending ? "从小到大" : "从大到小"}排列。`, answer, choices: shuffle([...set].slice(0, 4)) };
    }

    function makeEnemyQuestion() {
      const base = randInt(20, 79);
      const change = shuffle([-20, -10, 10, 20])[0];
      const answer = base + change;
      return { title: "怪物挑战", text: `${base} ${change > 0 ? "+" : "-"} ${Math.abs(change)} = ?`, answer: String(answer), choices: numberChoices(answer, [answer + 10, answer - 10, answer + 1]) };
    }

    const QUESTION_BANK = [makePlaceValueQuestion, makeRoundingQuestion, makePatternQuestion, makeBeforeAfterQuestion, makeComposeQuestion, makeCompareQuestion, () => makeOrderQuestion(true), () => makeOrderQuestion(false)];
    const ENEMY_BANK = [makeEnemyQuestion, makeCompareQuestion, () => makeOrderQuestion(true), () => makeOrderQuestion(false)];

    function createQuestion(type = "normal") {
      const bank = type === "enemy" ? ENEMY_BANK : QUESTION_BANK;
      return shuffle(bank)[0]();
    }

    function showQuestion(question, source, enemy = null) {
      game.mode = "question";
      game.currentQuestion = question;
      game.questionSource = source;
      game.activeEnemy = enemy;
      questionTitle.textContent = question.title;
      questionText.textContent = question.text;
      feedback.textContent = "";
      answerGrid.innerHTML = "";
      question.choices.forEach((choice) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = choice;
        button.addEventListener("click", () => answerQuestion(choice));
        answerGrid.appendChild(button);
      });
      screens.question.classList.add("active");
    }

    function answerQuestion(choice) {
      const correct = choice === game.currentQuestion.answer;
      [...answerGrid.children].forEach((button) => {
        button.disabled = true;
        if (button.textContent === game.currentQuestion.answer) button.style.background = "#39a85c";
        if (button.textContent === choice && !correct) button.style.background = "#d93636";
      });

      if (correct) {
        game.score += 10;
        playSfx("correct");
        feedback.textContent = game.questionSource === "enemy" ? "答对了！怪物退散，+10 分" : "答对了！+10 分";
        if (game.activeEnemy) game.activeEnemy.defeated = true;
      } else {
        if (game.questionSource === "enemy") damagePlayer(game.activeEnemy);
        else {
          game.hearts -= 1;
          playSfx("wrong");
        }
        feedback.textContent = `答错了。答案是 ${game.currentQuestion.answer}`;
      }

      setTimeout(() => {
        screens.question.classList.remove("active");
        game.currentQuestion = null;
        game.activeEnemy = null;
        game.mode = game.hearts <= 0 ? "gameOver" : "playing";
        if (game.hearts <= 0) screens.gameOver.classList.add("active");
        else setMessage(correct && game.score >= CONFIG.passScore ? "够 50 分了，去管道！" : correct ? "继续寻找下一块问号砖" : "小心，少了一颗心");
      }, CONFIG.questionDelay);
    }

    // ============================================================
    // PLAYER
    // ============================================================
    const player = { x: 170, y: 250, width: CONFIG.playerWidth, height: CONFIG.playerHeight, vx: 0, vy: 0, onGround: false, facing: 1, frame: 0, invincibleUntil: 0 };

    function resetPlayer() {
      player.x = 170;
      player.y = 250;
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;
      player.facing = 1;
      player.frame = 0;
      player.invincibleUntil = 0;
    }

    function drawCuteCharacter(targetCtx, x, y, scale, style, frame = 0, facing = 1, alpha = 1) {
      const p = style === "green"
        ? { hat: "#21a85a", light: "#69e08c", shirt: "#2fc86a", pants: "#245bd1", pantsLight: "#4f88ff", badge: "#ff6b81" }
        : { hat: "#f04444", light: "#ff8a82", shirt: "#ff5a4f", pants: "#2768d8", pantsLight: "#55a0ff", badge: "#37d6ff" };
      const s = scale;
      const bob = Math.abs(frame % 20 - 10) > 5 ? 1 : 0;
      const rootX = x + (facing < 0 ? 14 * s : 0);
      const rootY = y + bob * s;
      const rr = (rx, ry, rw, rh, r, c) => {
        targetCtx.fillStyle = c;
        targetCtx.beginPath();
        targetCtx.roundRect(rx, ry, rw, rh, r);
        targetCtx.fill();
      };
      const el = (cx, cy, rx, ry, c) => {
        targetCtx.fillStyle = c;
        targetCtx.beginPath();
        targetCtx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
        targetCtx.fill();
      };
      const star = (cx, cy, radius, c) => {
        targetCtx.fillStyle = c;
        targetCtx.beginPath();
        for (let i = 0; i < 10; i += 1) {
          const a = -Math.PI / 2 + i * Math.PI / 5;
          const r = i % 2 === 0 ? radius : radius * .45;
          const sx = cx + Math.cos(a) * r;
          const sy = cy + Math.sin(a) * r;
          if (i === 0) targetCtx.moveTo(sx, sy);
          else targetCtx.lineTo(sx, sy);
        }
        targetCtx.closePath();
        targetCtx.fill();
      };
      targetCtx.save();
      targetCtx.globalAlpha = alpha;
      targetCtx.translate(rootX, rootY);
      targetCtx.scale(facing, 1);
      el(7 * s, 15.2 * s, 5.2 * s, 1.1 * s, "rgba(0,0,0,.18)");
      const head = targetCtx.createRadialGradient(5.2 * s, 3.5 * s, .4 * s, 7 * s, 4.8 * s, 4.9 * s);
      head.addColorStop(0, "#ffe0b5");
      head.addColorStop(.68, "#f4bd86");
      head.addColorStop(1, "#d98b55");
      el(7 * s, 4.5 * s, 4.2 * s, 3.6 * s, head);
      rr(3.1 * s, .8 * s, 7.8 * s, 2.3 * s, 1.1 * s, p.hat);
      rr(1.4 * s, 2.1 * s, 10.5 * s, 1.35 * s, .65 * s, p.hat);
      el(6.1 * s, 1.45 * s, 1.2 * s, .45 * s, p.light);
      rr(6.4 * s, 1.55 * s, 2.1 * s, 1.15 * s, .35 * s, "#fff6d5");
      star(10.25 * s, 1.05 * s, .78 * s, "#fff176");
      targetCtx.fillStyle = p.hat;
      targetCtx.font = `${1.15 * s}px Arial`;
      targetCtx.textAlign = "center";
      targetCtx.textBaseline = "middle";
      targetCtx.fillText(style === "green" ? "G" : "R", 7.45 * s, 2.15 * s);
      rr(3.2 * s, 3.05 * s, 2.1 * s, 2.15 * s, .4 * s, "#4a2a16");
      el(5.65 * s, 4.35 * s, .55 * s, .72 * s, "#171717");
      el(8.45 * s, 4.35 * s, .55 * s, .72 * s, "#171717");
      el(5.48 * s, 4.05 * s, .18 * s, .22 * s, "#fff");
      el(8.28 * s, 4.05 * s, .18 * s, .22 * s, "#fff");
      targetCtx.strokeStyle = "#7a3219";
      targetCtx.lineWidth = .24 * s;
      targetCtx.beginPath();
      targetCtx.arc(7.08 * s, 5 * s, .9 * s, .18 * Math.PI, .82 * Math.PI);
      targetCtx.stroke();
      el(4.15 * s, 5.12 * s, .68 * s, .38 * s, "#ff9aae");
      el(9.92 * s, 5.12 * s, .68 * s, .38 * s, "#ff9aae");
      rr(2.05 * s, 7.2 * s, 2.2 * s, 4.3 * s, .95 * s, "#9a64ff");
      rr(2.7 * s, 6.7 * s, 8.8 * s, 5.3 * s, 1.5 * s, p.shirt);
      rr(3.65 * s, 8.05 * s, 6.9 * s, 4.65 * s, 1.1 * s, p.pants);
      rr(4.25 * s, 8.45 * s, 2 * s, .65 * s, .3 * s, p.pantsLight);
      rr(7.8 * s, 8.45 * s, 2 * s, .65 * s, .3 * s, p.pantsLight);
      rr(3.05 * s, 6.35 * s, 8.2 * s, 1 * s, .45 * s, "#ffd447");
      el(7.1 * s, 10.15 * s, .85 * s, .85 * s, p.badge);
      targetCtx.fillStyle = "#fff";
      targetCtx.beginPath();
      targetCtx.moveTo(7.1 * s, 10.55 * s);
      targetCtx.bezierCurveTo(5.9 * s, 9.75 * s, 6.45 * s, 9.25 * s, 7.1 * s, 9.7 * s);
      targetCtx.bezierCurveTo(7.75 * s, 9.25 * s, 8.3 * s, 9.75 * s, 7.1 * s, 10.55 * s);
      targetCtx.fill();
      const arm = Math.sin(frame / 5) * .65 * s;
      rr(1.1 * s, 7.4 * s + arm, 2.5 * s, 3.5 * s, 1 * s, "#f4bd86");
      rr(10.4 * s, 7.4 * s - arm, 2.5 * s, 3.5 * s, 1 * s, "#f4bd86");
      el(2.25 * s, 10.9 * s + arm, 1 * s, .82 * s, "#fff");
      el(11.55 * s, 10.9 * s - arm, 1 * s, .82 * s, "#fff");
      const leg = Math.sin(frame / 5) * .45 * s;
      rr(4 * s, 12 * s, 2.4 * s, 2.4 * s + Math.max(0, leg), .65 * s, p.pants);
      rr(7.7 * s, 12 * s, 2.4 * s, 2.4 * s + Math.max(0, -leg), .65 * s, p.pants);
      rr(3.35 * s, 14 * s + Math.max(0, leg), 3.25 * s, 1 * s, .45 * s, "#3b2418");
      rr(7.5 * s, 14 * s + Math.max(0, -leg), 3.25 * s, 1 * s, .45 * s, "#3b2418");
      targetCtx.globalAlpha = Math.min(alpha, .28);
      el(5.4 * s, 3.65 * s, 1.05 * s, .72 * s, "#fff");
      rr(4.4 * s, 7.3 * s, 1.8 * s, 3.5 * s, .75 * s, "#fff");
      targetCtx.restore();
    }

    function drawCharacterPreviews() {
      document.querySelectorAll("[data-preview]").forEach((preview) => {
        const c = preview.getContext("2d");
        c.clearRect(0, 0, preview.width, preview.height);
        c.fillStyle = "#bdeeff";
        c.fillRect(0, 0, preview.width, preview.height);
        c.fillStyle = "#5fb84a";
        c.fillRect(0, 74, preview.width, 18);
        drawCuteCharacter(c, 14, 6, 4.6, preview.dataset.preview, 0, 1);
      });
    }

    // ============================================================
    // ENEMIES
    // ============================================================
    const enemies = [];

    function resetEnemies() {
      enemies.length = 0;
      enemies.push({ x: 1110, y: CONFIG.groundY - 34, width: 38, height: 34, vx: 1.25, minX: 990, maxX: 1280, defeated: false });
      enemies.push({ x: 1780, y: CONFIG.groundY - 34, width: 38, height: 34, vx: -1.1, minX: 1680, maxX: 1920, defeated: false });
    }

    function updateEnemies() {
      enemies.forEach((enemy) => {
        if (enemy.defeated) return;
        enemy.x += enemy.vx;
        if (enemy.x < enemy.minX || enemy.x + enemy.width > enemy.maxX) enemy.vx *= -1;
      });
    }

    function drawEnemy(enemy) {
      const x = Math.round(enemy.x - game.cameraX);
      const y = Math.round(enemy.y);
      ctx.fillStyle = "#6b3b21";
      ctx.fillRect(x + 4, y + 10, enemy.width - 8, enemy.height - 6);
      ctx.fillStyle = "#8e5130";
      ctx.fillRect(x, y + 16, enemy.width, enemy.height - 12);
      ctx.fillStyle = "#fff";
      ctx.fillRect(x + 8, y + 14, 7, 7);
      ctx.fillRect(x + 23, y + 14, 7, 7);
      ctx.fillStyle = "#111";
      ctx.fillRect(x + 10, y + 16, 3, 3);
      ctx.fillRect(x + 25, y + 16, 3, 3);
    }

    function damagePlayer(source) {
      const now = performance.now();
      if (player.invincibleUntil > now) return;
      game.hearts -= 1;
      player.invincibleUntil = now + CONFIG.enemyCooldown;
      player.vx = source && source.x < player.x ? 5 : -5;
      player.vy = -8;
      playSfx("hit");
      setMessage("碰到怪物，少了一颗心");
      if (game.hearts <= 0) {
        game.mode = "gameOver";
        screens.gameOver.classList.add("active");
      }
    }

    // ============================================================
    // COINS
    // ============================================================
    const coins = [];

    function resetCoins() {
      coins.length = 0;
      [[320,350], [380,350], [620,250], [680,250], [930,356], [1200,300], [1450,245], [1510,245], [1770,360], [1880,360]].forEach(([x, y]) => {
        coins.push({ x, y, width: 22, height: 28, collected: false });
      });
    }

    function updateCoins() {
      coins.forEach((coin) => {
        if (!coin.collected && rectsOverlap(player, coin)) {
          coin.collected = true;
          game.coins += 1;
          playSfx("coin");
          setMessage("收集金币");
        }
      });
    }

    function drawCoin(coin) {
      if (coin.collected) return;
      const pulse = Math.sin(game.animationTime / 110);
      const w = 10 + Math.abs(pulse) * 12;
      const x = coin.x - game.cameraX + coin.width / 2 - w / 2;
      const y = coin.y + Math.sin(game.animationTime / 160 + coin.x) * 4;
      ctx.fillStyle = "#b67b00";
      ctx.fillRect(x - 2, y + 2, w + 4, coin.height - 2);
      ctx.fillStyle = "#ffd23b";
      ctx.fillRect(x, y, w, coin.height - 4);
      ctx.fillStyle = "rgba(255,255,255,.75)";
      ctx.fillRect(x + Math.max(2, w * .3), y + 5, Math.max(2, w * .18), 8);
    }

    // ============================================================
    // BLOCKS
    // ============================================================
    const blocks = [];
    const platforms = [
      { x: 0, y: CONFIG.groundY, width: CONFIG.worldWidth, height: 72, type: "ground" },
      { x: 560, y: 330, width: 180, height: 28, type: "platform" },
      { x: 1380, y: 318, width: 210, height: 28, type: "platform" }
    ];

    function resetBlocks() {
      blocks.length = 0;
      [[300,318], [430,318], [610,215], [760,306], [920,318], [1080,318], [1260,302], [1440,204], [1580,204], [1740,318], [1920,318], [2080,308]].forEach(([x, y]) => {
        blocks.push({ x, y, baseY: y, width: 38, height: 38, used: false, bump: 0, type: "questionBlock" });
      });
    }

    function updateBlocks() {
      blocks.forEach((block) => {
        if (block.bump > 0) block.bump *= .72;
        if (block.bump < .5) block.bump = 0;
        block.y = block.baseY - block.bump;
      });
    }

    function drawBlock(block) {
      const x = Math.round(block.x - game.cameraX);
      const y = Math.round(block.y);
      ctx.fillStyle = block.used ? "#b78345" : "#9a6016";
      ctx.fillRect(x, y, block.width, block.height);
      ctx.fillStyle = block.used ? "#d19a5b" : "#f5b737";
      ctx.fillRect(x + 4, y + 4, block.width - 8, block.height - 8);
      if (!block.used) {
        ctx.fillStyle = "#7d4210";
        ctx.font = "bold 28px Arial";
        ctx.textAlign = "center";
        ctx.fillText("?", x + block.width / 2, y + 29);
      }
    }

    function drawPlatform(platform) {
      const x = Math.round(platform.x - game.cameraX);
      const y = Math.round(platform.y);
      if (platform.type === "ground") {
        ctx.fillStyle = "#38a84f";
        ctx.fillRect(x, y, platform.width, 16);
        ctx.fillStyle = "#9c6429";
        ctx.fillRect(x, y + 16, platform.width, platform.height - 16);
        ctx.strokeStyle = "#7a481c";
        ctx.lineWidth = 2;
        for (let tx = Math.floor(platform.x / 36) * 36; tx < platform.x + platform.width; tx += 36) {
          const sx = tx - game.cameraX;
          ctx.beginPath();
          ctx.moveTo(sx, y + 16);
          ctx.lineTo(sx + 36, y + 52);
          ctx.stroke();
        }
      } else {
        ctx.fillStyle = "#7c391c";
        ctx.fillRect(x, y, platform.width, platform.height);
        ctx.fillStyle = "#b8642a";
        for (let bx = 0; bx < platform.width; bx += 36) {
          ctx.fillRect(x + bx + 2, y + 2, 32, 11);
          ctx.fillRect(x + bx + 11, y + 15, 32, 11);
        }
      }
    }

    // ============================================================
    // PIPE
    // ============================================================
    const pipe = { x: 2240, y: CONFIG.groundY - 86, width: 70, height: 86 };

    function updatePipe() {
      if (game.score >= CONFIG.passScore && rectsOverlap(player, pipe)) {
        game.mode = "success";
        screens.success.classList.add("active");
      }
    }

    function drawPipe() {
      const x = Math.round(pipe.x - game.cameraX);
      const y = Math.round(pipe.y);
      ctx.fillStyle = "#137632";
      ctx.fillRect(x - 8, y, pipe.width + 16, 24);
      ctx.fillStyle = "#2aa84f";
      ctx.fillRect(x - 3, y + 4, pipe.width + 6, 16);
      ctx.fillRect(x, y + 22, pipe.width, pipe.height - 22);
      ctx.fillStyle = "rgba(255,255,255,.25)";
      ctx.fillRect(x + 10, y + 8, 10, pipe.height - 12);
    }

    // ============================================================
    // INPUT
    // ============================================================
    const input = { left: false, right: false, jump: false, jumpQueued: false };

    function queueJump() {
      input.jump = true;
      input.jumpQueued = true;
    }

    function releaseJump() {
      input.jump = false;
    }

    window.addEventListener("keydown", (event) => {
      if (event.code === "ArrowLeft") input.left = true;
      if (event.code === "ArrowRight") input.right = true;
      if (event.code === "Space") {
        event.preventDefault();
        if (!input.jump) queueJump();
      }
    });

    window.addEventListener("keyup", (event) => {
      if (event.code === "ArrowLeft") input.left = false;
      if (event.code === "ArrowRight") input.right = false;
      if (event.code === "Space") releaseJump();
    });

    function bindHoldButton(button, key) {
      const on = (event) => {
        event.preventDefault();
        if (event.pointerId && button.setPointerCapture) button.setPointerCapture(event.pointerId);
        input[key] = true;
        if (key === "jump") queueJump();
        button.classList.add("pressed");
      };
      const off = (event) => {
        event.preventDefault();
        if (event.pointerId && button.releasePointerCapture) {
          try { button.releasePointerCapture(event.pointerId); } catch (error) {}
        }
        input[key] = false;
        if (key === "jump") releaseJump();
        button.classList.remove("pressed");
      };
      ["pointerdown", "touchstart"].forEach((name) => button.addEventListener(name, on, { passive: false }));
      ["pointerup", "pointercancel", "pointerleave", "touchend", "touchcancel"].forEach((name) => button.addEventListener(name, off, { passive: false }));
    }

    bindHoldButton(document.getElementById("leftBtn"), "left");
    bindHoldButton(document.getElementById("rightBtn"), "right");
    bindHoldButton(document.getElementById("jumpBtn"), "jump");

    ["contextmenu", "selectstart", "dragstart"].forEach((name) => {
      document.addEventListener(name, (event) => event.preventDefault(), { passive: false });
    });

    document.getElementById("startBtn").addEventListener("click", () => {
      screens.start.classList.remove("active");
      screens.character.classList.add("active");
      game.mode = "character";
    });
    document.getElementById("playBtn").addEventListener("click", resetGame);
    document.getElementById("restartWinBtn").addEventListener("click", resetGame);
    document.getElementById("restartLoseBtn").addEventListener("click", resetGame);
    document.querySelectorAll("[data-character]").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll("[data-character]").forEach((item) => item.classList.remove("selected"));
        button.classList.add("selected");
        game.character = button.dataset.character;
      });
    });
    musicBtn.addEventListener("click", () => game.musicOn ? stopMusic() : startMusic());

    // ============================================================
    // UPDATE
    // ============================================================
    function rectsOverlap(a, b) {
      return a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y;
    }

    function solidObjects() {
      return [...platforms, ...blocks];
    }

    function updatePlayer() {
      if (game.mode !== "playing") return;
      const previous = { x: player.x, y: player.y };
      player.vx = 0;
      if (input.left) { player.vx = -CONFIG.moveSpeed; player.facing = -1; }
      if (input.right) { player.vx = CONFIG.moveSpeed; player.facing = 1; }
      if (input.jumpQueued && player.onGround) {
        player.vy = -CONFIG.jumpPower;
        player.onGround = false;
        playSfx("jump");
      }
      input.jumpQueued = false;
      player.vy = Math.min(CONFIG.maxFallSpeed, player.vy + CONFIG.gravity);
      player.x += player.vx;
      resolveCollisions("x", previous);
      player.y += player.vy;
      player.onGround = false;
      resolveCollisions("y", previous);
      player.x = Math.max(0, Math.min(CONFIG.worldWidth - player.width, player.x));
      if (player.y > CONFIG.canvasHeight + 80) damagePlayer({ x: player.x - 100 });
      if (player.vx !== 0) player.frame += 1;
    }

    function resolveCollisions(axis, previous) {
      for (const solid of solidObjects()) {
        if (!rectsOverlap(player, solid)) continue;
        if (axis === "x") {
          if (player.vx > 0) player.x = solid.x - player.width;
          if (player.vx < 0) player.x = solid.x + solid.width;
          player.vx = 0;
        }
        if (axis === "y") {
          if (player.vy > 0 && previous.y + player.height <= solid.y + 8) {
            player.y = solid.y - player.height;
            player.vy = 0;
            player.onGround = true;
          } else if (player.vy < 0 && previous.y >= solid.y + solid.height - 8) {
            player.y = solid.y + solid.height;
            player.vy = 0;
            if (solid.type === "questionBlock" && !solid.used) {
              solid.used = true;
              solid.bump = 16;
              showQuestion(createQuestion("normal"), "block");
            }
          }
        }
      }
    }

    function updateEnemyCollisions() {
      enemies.forEach((enemy) => {
        if (enemy.defeated || !rectsOverlap(player, enemy)) return;
        const stomp = player.vy > 0 && player.y + player.height - enemy.y < 18;
        if (stomp) {
          player.vy = -9;
          enemy.defeated = true;
          playSfx("correct");
          setMessage("踩扁怪物");
        } else {
          showQuestion(createQuestion("enemy"), "enemy", enemy);
        }
      });
    }

    function updateCamera() {
      const target = player.x - CONFIG.canvasWidth * .42;
      game.cameraX += (target - game.cameraX) * .12;
      game.cameraX = Math.max(0, Math.min(CONFIG.worldWidth - CONFIG.canvasWidth, game.cameraX));
    }

    function updateGame(timestamp) {
      game.animationTime = timestamp;
      updateBlocks();
      if (game.mode === "playing") {
        updatePlayer();
        updateEnemies();
        updateEnemyCollisions();
        updateCoins();
        updatePipe();
        updateCamera();
      }
    }

    // ============================================================
    // DRAW
    // ============================================================
    function drawBackground() {
      if (skyImage.complete && skyImage.naturalWidth > 0) {
        const parallax = -game.cameraX * .18;
        const imgW = CONFIG.canvasWidth;
        for (let x = parallax % imgW - imgW; x < CONFIG.canvasWidth + imgW; x += imgW) {
          ctx.drawImage(skyImage, x, 0, imgW, CONFIG.canvasHeight);
        }
      } else {
        const sky = ctx.createLinearGradient(0, 0, 0, CONFIG.canvasHeight);
        sky.addColorStop(0, "#75d2ff");
        sky.addColorStop(.72, "#dff8ff");
        sky.addColorStop(1, "#85d66a");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, CONFIG.canvasWidth, CONFIG.canvasHeight);
      }
      drawHill(120 - game.cameraX * .28, 410, "#6ac95f");
      drawHill(780 - game.cameraX * .25, 432, "#58b548");
      drawHill(1460 - game.cameraX * .28, 412, "#6ac95f");
    }

    function drawHill(x, y, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x, CONFIG.groundY);
      ctx.quadraticCurveTo(x + 130, y - 170, x + 270, CONFIG.groundY);
      ctx.closePath();
      ctx.fill();
    }

    function drawPlayer() {
      const now = performance.now();
      if (player.invincibleUntil > now && Math.floor(now / 90) % 2 === 0) return;
      drawCuteCharacter(ctx, Math.round(player.x - game.cameraX - 10), Math.round(player.y - 9), 3.8, game.character, player.frame, player.facing);
    }

    function drawHud() {
      ctx.save();
      ctx.fillStyle = "rgba(255,248,220,.9)";
      ctx.fillRect(12, 12, 342, 46);
      ctx.strokeStyle = "#6d421d";
      ctx.lineWidth = 3;
      ctx.strokeRect(12, 12, 342, 46);
      ctx.fillStyle = "#1d2440";
      ctx.font = "bold 20px Arial";
      ctx.textAlign = "left";
      ctx.fillText(`分数 ${game.score}`, 26, 43);
      ctx.fillText(`金币 ${game.coins}`, 136, 43);
      for (let i = 0; i < CONFIG.maxHearts; i += 1) drawHeart(242 + i * 28, 27, i < game.hearts ? "#e53935" : "#999");
      if (game.messageUntil > performance.now()) {
        const textWidth = ctx.measureText(game.message).width + 32;
        ctx.fillStyle = "rgba(29,36,64,.74)";
        ctx.fillRect((CONFIG.canvasWidth - textWidth) / 2, 18, textWidth, 38);
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.fillText(game.message, CONFIG.canvasWidth / 2, 44);
      }
      ctx.fillStyle = game.score >= CONFIG.passScore ? "#2f9f5b" : "rgba(255,248,220,.9)";
      ctx.fillRect(CONFIG.canvasWidth - 258, 12, 246, 46);
      ctx.strokeStyle = "#6d421d";
      ctx.strokeRect(CONFIG.canvasWidth - 258, 12, 246, 46);
      ctx.fillStyle = game.score >= CONFIG.passScore ? "#fff" : "#1d2440";
      ctx.textAlign = "center";
      ctx.fillText(game.score >= CONFIG.passScore ? "进入管道通关！" : `到 50 分可进管道：${game.score}/50`, CONFIG.canvasWidth - 135, 43);
      ctx.restore();
    }

    function drawHeart(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x + 4, y, 8, 8);
      ctx.fillRect(x + 16, y, 8, 8);
      ctx.fillRect(x, y + 8, 28, 8);
      ctx.fillRect(x + 4, y + 16, 20, 8);
      ctx.fillRect(x + 10, y + 24, 8, 7);
    }

    function drawScene() {
      ctx.clearRect(0, 0, CONFIG.canvasWidth, CONFIG.canvasHeight);
      drawBackground();
      platforms.forEach(drawPlatform);
      drawPipe();
      blocks.forEach(drawBlock);
      coins.forEach(drawCoin);
      enemies.forEach((enemy) => { if (!enemy.defeated) drawEnemy(enemy); });
      drawPlayer();
      drawHud();
    }

    function gameLoop(timestamp) {
      updateGame(timestamp);
      drawScene();
      requestAnimationFrame(gameLoop);
    }

    drawCharacterPreviews();
    resetPlayer();
    resetCoins();
    resetBlocks();
    resetEnemies();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
